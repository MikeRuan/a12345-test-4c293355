<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Mood Tracker 🌈</title>
  <style>
    /* === GENERAL PAGE STYLES === */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      min-height: 100vh;
      padding: 24px 16px;
      /* Default background — changes when a mood is picked */
      background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
      transition: background 0.7s ease;
    }

    /* === HEADER === */
    .header {
      text-align: center;
      background: #fff;
      border-radius: 30px;
      padding: 28px 20px 22px;
      margin-bottom: 28px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.11);
      border: 4px solid #b2ebf2;
      transition: border-color 0.7s ease;
    }

    .header .emoji-row { font-size: 2.6rem; letter-spacing: 8px; margin-bottom: 8px; }

    .header h1 {
      font-size: 2.4rem;
      color: #00838f;
      text-shadow: 2px 2px 0 #b2ebf2;
      line-height: 1.2;
      transition: color 0.7s ease;
    }

    .header .subtitle {
      font-size: 1.1rem;
      color: #777;
      margin-top: 6px;
    }

    /* === PROMPT CARD === */
    .prompt-card {
      background: #fff;
      border-radius: 24px;
      padding: 22px 24px;
      text-align: center;
      margin-bottom: 28px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.09);
      border: 3px dashed #b2ebf2;
      transition: border-color 0.7s ease;
    }

    .prompt-card p {
      font-size: 1.4rem;
      color: #444;
      line-height: 1.6;
    }

    /* === MOOD BUTTONS GRID === */
    .mood-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      max-width: 560px;
      margin: 0 auto 30px auto;
    }

    /* Each big mood button */
    .mood-btn {
      background: #fff;
      border: none;
      border-radius: 28px;
      padding: 30px 16px 24px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transition: transform 0.18s, box-shadow 0.18s, border 0.2s;
      border: 5px solid transparent;
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    }

    .mood-btn:hover {
      transform: translateY(-6px) scale(1.04);
      box-shadow: 0 12px 28px rgba(0,0,0,0.16);
    }

    /* Each button has a coloured top border to hint at the mood */
    .mood-btn.happy  { border-top-color: #ffd600; }
    .mood-btn.tired  { border-top-color: #7c9fbd; }
    .mood-btn.excited { border-top-color: #ff7043; }
    .mood-btn.worried { border-top-color: #8d6e9e; }

    /* Active/selected state — glows when clicked */
    .mood-btn.selected {
      transform: translateY(-4px) scale(1.06);
      box-shadow: 0 0 0 5px rgba(0,0,0,0.12), 0 10px 28px rgba(0,0,0,0.18);
    }

    .mood-btn .mood-emoji { font-size: 3.6rem; line-height: 1; }

    .mood-btn .mood-label {
      font-size: 1.4rem;
      font-weight: bold;
      color: #333;
    }

    .mood-btn .mood-hint {
      font-size: 0.95rem;
      color: #888;
      text-align: center;
      line-height: 1.4;
    }

    /* === MESSAGE BOX (hidden at start) === */
    .message-box {
      max-width: 560px;
      margin: 0 auto 28px auto;
      background: #fff;
      border-radius: 26px;
      padding: 28px 26px;
      text-align: center;
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
      border: 4px solid #ccc;
      display: none;         /* hidden until a mood is clicked */
      transition: border-color 0.5s ease;
      animation: popIn 0.4s ease;
    }

    /* Smooth pop-in animation for the message */
    @keyframes popIn {
      0%   { transform: scale(0.85); opacity: 0; }
      70%  { transform: scale(1.04); opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }

    .message-box .msg-emoji { font-size: 4rem; margin-bottom: 12px; }

    .message-box .msg-title {
      font-size: 1.8rem;
      margin-bottom: 10px;
      color: #333;
    }

    .message-box .msg-text {
      font-size: 1.15rem;
      color: #555;
      line-height: 1.75;
    }

    .message-box .msg-tip {
      margin-top: 16px;
      background: #f5f5f5;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 1.05rem;
      color: #444;
      line-height: 1.6;
    }

    .message-box .msg-tip strong { color: #00838f; }

    /* === FOOTER === */
    footer {
      text-align: center;
      font-size: 1rem;
      color: #555;
      padding-bottom: 10px;
      max-width: 560px;
      margin: 0 auto;
    }

    /* === MOBILE TWEAKS === */
    @media (max-width: 420px) {
      .header h1   { font-size: 1.8rem; }
      .mood-btn    { padding: 22px 10px 18px; }
      .mood-btn .mood-emoji { font-size: 2.8rem; }
      .mood-btn .mood-label { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <div class="header" id="mainHeader">
    <div class="emoji-row">🌈 💛 🌈</div>
    <h1 id="headerTitle">My Mood Tracker</h1>
    <p class="subtitle">How are you feeling right now? It's okay to feel anything! 🌟</p>
  </div>

  <!-- ===== PROMPT ===== -->
  <div class="prompt-card" id="promptCard">
    <p>👇 Tap the face that matches how you feel today!</p>
  </div>

  <!-- ===== FOUR MOOD BUTTONS ===== -->
  <div class="mood-grid">

    <!-- Happy -->
    <button class="mood-btn happy" id="btnHappy">
      <span class="mood-emoji">😄</span>
      <span class="mood-label">Happy</span>
      <span class="mood-hint">Joyful &amp; smiling</span>
    </button>

    <!-- Tired -->
    <button class="mood-btn tired" id="btnTired">
      <span class="mood-emoji">😴</span>
      <span class="mood-label">Tired</span>
      <span class="mood-hint">Sleepy &amp; low energy</span>
    </button>

    <!-- Excited -->
    <button class="mood-btn excited" id="btnExcited">
      <span class="mood-emoji">🤩</span>
      <span class="mood-label">Excited</span>
      <span class="mood-hint">Buzzing with energy!</span>
    </button>

    <!-- Worried -->
    <button class="mood-btn worried" id="btnWorried">
      <span class="mood-emoji">😟</span>
      <span class="mood-label">Worried</span>
      <span class="mood-hint">Nervous or anxious</span>
    </button>

  </div>

  <!-- ===== MESSAGE BOX (shown after clicking a mood) ===== -->
  <div class="message-box" id="messageBox">
    <div class="msg-emoji" id="msgEmoji">😄</div>
    <div class="msg-title" id="msgTitle">You're feeling Happy!</div>
    <div class="msg-text" id="msgText">That's wonderful!</div>
    <div class="msg-tip"  id="msgTip">Try something fun today!</div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer>
    All feelings are valid 💛 &nbsp;|&nbsp; Remember: you are never alone 🤝
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {

      // ---- Grab all the elements we'll need ----
      var body        = document.body;
      var mainHeader  = document.getElementById('mainHeader');
      var headerTitle = document.getElementById('headerTitle');
      var promptCard  = document.getElementById('promptCard');
      var messageBox  = document.getElementById('messageBox');
      var msgEmoji    = document.getElementById('msgEmoji');
      var msgTitle    = document.getElementById('msgTitle');
      var msgText     = document.getElementById('msgText');
      var msgTip      = document.getElementById('msgTip');

      var btnHappy   = document.getElementById('btnHappy');
      var btnTired   = document.getElementById('btnTired');
      var btnExcited = document.getElementById('btnExcited');
      var btnWorried = document.getElementById('btnWorried');

      // ---- Data for each mood ----
      // Each entry has: bg color, border accent, emoji, title, message, tip
      var moods = {
        happy: {
          bg:       'linear-gradient(135deg, #fffde7 0%, #fff9c4 100%)',
          border:   '#ffd600',
          headerColor: '#f9a825',
          emoji:    '😄',
          title:    'You\'re feeling Happy! 🌟',
          text:     'That\'s amazing! Happiness is a wonderful feeling. You might be smiling a lot today — and that\'s totally contagious! 😊',
          tip:      '💡 <strong>Try this:</strong> Share your good mood! Say something kind to a friend or draw a happy picture to brighten someone\'s day.'
        },
        tired: {
          bg:       'linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%)',
          border:   '#7c9fbd',
          headerColor: '#1565c0',
          emoji:    '😴',
          title:    'You\'re feeling Tired 💤',
          text:     'It\'s okay to feel tired! Your body and brain work really hard every day. Being tired just means you need a little rest — that\'s totally normal.',
          tip:      '💡 <strong>Try this:</strong> Take three slow, deep breaths. Have a small snack, drink some water, or find a quiet spot to relax for a few minutes.'
        },
        excited: {
          bg:       'linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%)',
          border:   '#ff7043',
          headerColor: '#e64a19',
          emoji:    '🤩',
          title:    'You\'re feeling Excited! 🎉',
          text:     'Wow, you\'ve got lots of energy right now! Excitement means something great is happening — or you\'re looking forward to something awesome. Enjoy that spark! ⚡',
          tip:      '💡 <strong>Try this:</strong> Write down what you\'re excited about, or tell a friend! Sharing excitement makes it even more fun. 🚀'
        },
        worried: {
          bg:       'linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%)',
          border:   '#8d6e9e',
          headerColor: '#6a1b9a',
          emoji:    '😟',
          title:    'You\'re feeling Worried 💜',
          text:     'It\'s completely okay to feel worried — everyone does sometimes. Worries can feel big, but you don\'t have to face them alone. You are safe, and things will be okay. 🌷',
          tip:      '💡 <strong>Try this:</strong> Talk to a trusted grown-up, like a teacher or a parent. Or try this: breathe in for 4 counts, hold for 4, breathe out for 4. 🧘'
        }
      };

      // ---- Function that updates the whole page for a mood ----
      function showMood(moodKey) {
        var m = moods[moodKey];

        // 1. Change the page background colour
        body.style.background = m.bg;
        body.style.transition  = 'background 0.7s ease';

        // 2. Update header border & title colour
        if (mainHeader) {
          mainHeader.style.borderColor = m.border;
          mainHeader.style.transition  = 'border-color 0.7s ease';
        }
        if (headerTitle) {
          headerTitle.style.color      = m.headerColor;
          headerTitle.style.textShadow = '2px 2px 0 ' + m.border;
        }

        // 3. Update prompt card border
        if (promptCard) {
          promptCard.style.borderColor = m.border;
        }

        // 4. Fill in the message box
        msgEmoji.textContent    = m.emoji;
        msgTitle.textContent    = m.title;
        msgText.textContent     = m.text;
        msgTip.innerHTML        = m.tip;   // innerHTML so <strong> works
        messageBox.style.borderColor = m.border;

        // 5. Show the message box with a fresh animation
        messageBox.style.display   = 'block';
        // Re-trigger the pop-in animation by removing & re-adding it
        messageBox.style.animation = 'none';
        // Force browser to notice the change before re-applying
        void messageBox.offsetWidth;
        messageBox.style.animation = 'popIn 0.4s ease';

        // 6. Highlight the selected button, de-select the others
        var allBtns = document.querySelectorAll('.mood-btn');
        allBtns.forEach(function(btn) {
          btn.classList.remove('selected');
          btn.style.opacity = '0.6';
        });
        var active = document.getElementById('btn' + moodKey.charAt(0).toUpperCase() + moodKey.slice(1));
        if (active) {
          active.classList.add('selected');
          active.style.opacity   = '1';
          active.style.borderColor = m.border;
        }

        // 7. Smooth-scroll to the message box
        messageBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      // ---- Attach click listeners to each mood button ----
      if (btnHappy)   btnHappy.addEventListener('click',   function() { showMood('happy');   });
      if (btnTired)   btnTired.addEventListener('click',   function() { showMood('tired');   });
      if (btnExcited) btnExcited.addEventListener('click', function() { showMood('excited'); });
      if (btnWorried) btnWorried.addEventListener('click', function() { showMood('worried'); });

      // ---- Gentle bounce-in for the header on load ----
      if (mainHeader) {
        mainHeader.style.transform  = 'scale(0.95)';
        mainHeader.style.transition = 'transform 0.45s ease';
        setTimeout(function() {
          mainHeader.style.transform = 'scale(1)';
        }, 80);
      }

      // ---- Stagger-animate the mood buttons on load ----
      var allBtns = document.querySelectorAll('.mood-btn');
      allBtns.forEach(function(btn, i) {
        btn.style.opacity   = '0';
        btn.style.transform = 'translateY(20px)';
        btn.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
        setTimeout(function() {
          btn.style.opacity   = '1';
          btn.style.transform = 'translateY(0)';
        }, 200 + i * 120);
      });

      // BUTTON CHECKLIST: #btnHappy ✓  #btnTired ✓  #btnExcited ✓  #btnWorried ✓
    });
  </script>

</body>
</html>
